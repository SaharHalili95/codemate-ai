services:
  - type: web
    name: codemate-ai-backend
    env: python
    region: frankfurt
    plan: free
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEMO_MODE
        value: true
      - key: OPENAI_API_KEY
        value: ""
      - key: LLM_PROVIDER
        value: openai
      - key: EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: CHUNK_SIZE
        value: 1000
      - key: CHUNK_OVERLAP
        value: 200
      - key: TOP_K
        value: 5
      - key: MODEL_NAME
        value: gpt-4-turbo-preview
      - key: TEMPERATURE
        value: 0.1
      - key: PYTHON_VERSION
        value: 3.11.0
